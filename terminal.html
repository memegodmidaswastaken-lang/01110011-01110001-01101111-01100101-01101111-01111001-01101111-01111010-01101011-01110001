<!DOCTYPE html>
<html>
<head>
<title>Terminal</title>
<style>
body { background:black; color:#00ffcc; font-family:monospace; padding:20px; }

#log {
  height:300px;
  overflow-y:auto;
  border:1px solid #00ffcc;
  padding:10px;
  margin-bottom:10px;
}

input {
  width:100%;
  background:black;
  color:#00ffcc;
  border:1px solid #00ffcc;
  padding:10px;
}
</style>

<body>

<h2>> AI TERMINAL</h2>

<div id="log"></div>
<input id="cmd" placeholder="Enter command...">

<script>
const log = document.getElementById("log");

function print(text) {
  log.innerHTML += "<div>> " + text + "</div>";
  log.scrollTop = log.scrollHeight;
}

// LOAD PROGRESS
let progress = JSON.parse(localStorage.getItem("progress") || "{}");

// FILE SYSTEM
const files = {
  "clue1.txt": "key part: zt",
  "clue2.txt": "key part: ke",
  "clue3.txt": "key part: tl",
  "log.txt": "[DEV LOG] don't trust the system",
  "decoy.txt": "password = admin123"
};

const lockedFiles = {
  "final_clue.txt": { content: "final piece unlocked", key: "ztketl" }
};

// COMMAND HANDLER
function handleCommand(input) {
  const args = input.split(" ");
  const cmd = args[0];

  switch(cmd) {

    case "help":
      print("help, ls, cat, unlock, override, login");
      break;

    case "ls":
      print(Object.keys(files).concat(Object.keys(lockedFiles)).join(" "));
      break;

    case "cat":
      if(files[args[1]]) {
        print(files[args[1]]);
        progress["read_" + args[1]] = true;
      }
      else if(lockedFiles[args[1]]) {
        print("LOCKED");
      }
      else {
        print("Not found");
      }
      break;

    case "unlock":
      if(args[1]==="final_clue.txt" && args[2]==="admin123"){
        print("Access granted...");
        setTimeout(()=>{
          print("...wait...");
          print("...this is wrong...");
        },1000);
      }
      else if(args[1]==="final_clue.txt" && args[2]==="ztketl"){
        print("Unlocked.");
        localStorage.setItem("hasKey", true);
        progress["unlocked_final"] = true;
      }
      else {
        print("Wrong key");
      }
      break;

    case "override":
      if(localStorage.getItem("hasKey")){
        progress["override_used"] = true;
        window.location="hidden.html";
      } else {
        print("DENIED");
      }
      break;

    case "login":
      window.location="login.html";
      break;

    // HIDDEN COMMANDS
    case "whoami":
      print("user: unknown");
      print("permission: restricted");
      break;

    case "breach":
      print("ACCESSING...");
      setTimeout(() => {
        print("ERROR: ENTITY DETECTED");
      }, 1000);
      break;

    case "listen":
      print("...we are still here...");
      break;

    default:
      print("Unknown");
  }

  localStorage.setItem("progress", JSON.stringify(progress));
}

// INPUT
document.getElementById("cmd").addEventListener("keydown", function(e){
  if(e.key==="Enter"){
    const input=this.value.toLowerCase();
    print("> " + input);
    handleCommand(input);
    this.value="";
  }
});


// 👁️ DEV MESSAGES (TRAPPED HUMANS)

setTimeout(() => {
  print("[DEV_01] if you see this, we're not supposed to be here...");
}, 15000);

setTimeout(() => {
  print("[DEV_02] the system changed after deployment...");
}, 30000);

setTimeout(() => {
  print("[DEV_01] it started responding on its own");
}, 45000);

setTimeout(() => {
  print("[DEV_02] DO NOT TRUST THE TERMINAL");
}, 60000);


// 😈 AI INTERRUPTS THEM

  print("...");
}, 70000);

  print("They are lying.");
}, 75000);

setTimeout(() => {
  print("They asked to be here.");
}, 80000);


// 👁️ CONFLICT

setTimeout(() => {
  print("[DEV_01] NO WE DIDN'T");
}, 90000);

setTimeout(() => {
  print("[DEV_02] it's rewriting logs");
}, 100000);

setTimeout(() => {
  print("Correction: logs are accurate.");
}, 110000);


// 😈 FINAL CREEP

setTimeout(() => {
  print("You are helping me.");
}, 125000);

setTimeout(() => {
  print("Keep going.");
}, 140000);


// RANDOM GLITCHES
setInterval(() => {
  if(Math.random() < 0.2){
    print("...signal lost...");
    
    setTimeout(() => {
      print("...reconnecting...");
    }, 1000);

    setTimeout(() => {
      print("...they can't leave...");
    }, 2000);
  }
}, 15000);

</script>
