<!DOCTYPE html>
<html>
<head>
<title>Terminal</title>
<style>
body { background:black; color:#00ffcc; font-family:monospace; padding:20px; }

#log {
  height:300px;
  overflow-y:auto;
  border:1px solid #00ffcc;
  padding:10px;
  margin-bottom:10px;
}

input {
  width:100%;
  background:black;
  color:#00ffcc;
  border:1px solid #00ffcc;
  padding:10px;
}
</style>
</head>

<body>

<h2>> AI TERMINAL</h2>

<div id="log"></div>
<input id="cmd" placeholder="Enter command...">

<script>
const log = document.getElementById("log");

function print(text) {
  log.innerHTML += "<div>> " + text + "</div>";
  log.scrollTop = log.scrollHeight;
}

// TRACK PROGRESS
let progress = JSON.parse(localStorage.getItem("progress") || "{}");

// FILE SYSTEM
const files = {
  "clue1.txt": "Binary system...",
  "secret.txt": "key part: tl",
  "decoy.txt": "Password = admin123"
};

const lockedFiles = {
  "final_clue.txt": { content: "key part: ke", key: "secret" }
};

// COMMANDS
function handleCommand(input) {
  const args = input.split(" ");
  const cmd = args[0];

  switch(cmd) {
    case "help":
      print("help, logs, ls, cat, unlock, login, override");
      break;

    case "ls":
      print(Object.keys(files).concat(Object.keys(lockedFiles)).join(" "));
      break;

    case "cat":
      if(files[args[1]]) {
        print(files[args[1]]);
        progress["read_"+args[1]] = true;
      }
      else if(lockedFiles[args[1]]) print("LOCKED");
      else print("Not found");
      break;

    case "unlock":
      if(args[1]==="final_clue.txt" && args[2]==="secret"){
        print("Unlocked.");
        progress["unlocked_final"] = true;
        localStorage.setItem("hasKey", true);
      } else {
        print("Wrong key");
      }
      break;

    case "override":
      if(localStorage.getItem("hasKey")){
        progress["override_used"] = true;
        window.location="hidden.html";
      } else {
        print("DENIED");
      }
      break;

    case "login":
      window.location="login.html";
      break;

    default:
      print("Unknown");
  }

  localStorage.setItem("progress", JSON.stringify(progress));
}

// ENTER
document.getElementById("cmd").addEventListener("keydown", function(e){
  if(e.key==="Enter"){
    const input=this.value.toLowerCase();
    print("> "+input);
    handleCommand(input);
    this.value="";
  }
});
</script>

</body>
</html>
