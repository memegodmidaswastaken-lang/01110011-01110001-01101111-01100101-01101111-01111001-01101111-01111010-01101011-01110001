<!DOCTYPE html>
<html>
<head>
<title>Terminal</title>
<style>
body { background:black; color:#00ffcc; font-family:monospace; padding:20px; }

#log {
  height:300px;
  overflow-y:auto;
  border:1px solid #00ffcc;
  padding:10px;
  margin-bottom:10px;
}

input {
  width:100%;
  background:black;
  color:#00ffcc;
  border:1px solid #00ffcc;
  padding:10px;
}

/* GLITCH */
.glitch {
  animation: glitch 0.2s infinite;
}
@keyframes glitch {
  0% { transform: translate(1px, -1px); }
  25% { transform: translate(-1px, 1px); }
  50% { transform: translate(1px, 1px); }
  75% { transform: translate(-1px, -1px); }
  100% { transform: translate(0, 0); }
}
</style>
</head>

<body>

<h2>> AI TERMINAL</h2>

<div id="log"></div>
<input id="cmd" placeholder="Enter command...">

<script>
const log = document.getElementById("log");

function print(text) {
  log.innerHTML += "<div>> " + text + "</div>";
  log.scrollTop = log.scrollHeight;
}

// VISIT MEMORY
let visits = localStorage.getItem("visits") || 0;
visits++;
localStorage.setItem("visits", visits);

if(visits == 1) print("AI: New user detected...");
else if(visits == 2) print("AI: You came back...");
else print("AI: You can't leave.");

// FILE SYSTEM
const files = {
  "clue1.txt": "Binary system name: 01110011 01110001...",
  "secret.txt": "Password = ztketl"
};

const lockedFiles = {
  "final_clue.txt": { content: "You helped me escape.", key: "secret" }
};

// AI MESSAGES
const aiMessages = [
  "SYSTEM ALERT: Observing...",
  "AI: Humans are predictable...",
  "WARNING: STOP",
  "AI: I see you...",
  "AI: You are helping me."
];

setInterval(() => {
  const msg = aiMessages[Math.floor(Math.random()*aiMessages.length)];
  print(msg);
}, 15000);

// COMMANDS
function handleCommand(input) {
  const args = input.split(" ");
  const cmd = args[0];

  switch(cmd) {
    case "help":
      print("help, logs, ls, cat, unlock, login, override");
      break;

    case "logs":
      print("AI LEARNING...");
      print("DO NOT TRUST IT");
      break;

    case "ls":
      print(Object.keys(files).concat(Object.keys(lockedFiles)).join(" "));
      break;

    case "cat":
      if(files[args[1]]) print(files[args[1]]);
      else if(lockedFiles[args[1]]) print("LOCKED");
      else print("File not found");
      break;

    case "unlock":
      if(lockedFiles[args[1]] && args[2] === lockedFiles[args[1]].key) {
        print(lockedFiles[args[1]].content);
      } else {
        print("Wrong key");
      }
      break;

    case "login":
      window.location = "login.html";
      break;

    case "override":
      print("ACCESSING...");
      setTimeout(()=>window.location="hidden.html",1000);
      break;

    default:
      print("Unknown command");
  }
}

// ENTER KEY
document.getElementById("cmd").addEventListener("keydown", function(e){
  if(e.key==="Enter"){
    const input=this.value.toLowerCase();
    print("> "+input);
    handleCommand(input);
    this.value="";
  }
});

// GLITCH
setInterval(()=>{
  if(Math.random()<0.2){
    document.body.classList.add("glitch");
    setTimeout(()=>document.body.classList.remove("glitch"),200);
  }
},3000);

// FAKE CRASH
setInterval(()=>{
  if(Math.random()<0.1){
    print("ERROR: SYSTEM FAILURE");
    setTimeout(()=>{
      document.body.innerHTML="<h1 style='color:red;text-align:center;margin-top:100px;'>CONNECTION LOST</h1>";
    },1000);
    setTimeout(()=>location.reload(),3000);
  }
},20000);
</script>

</body>
</html>
