<!DOCTYPE html>
<html>
<head>
<title>Terminal</title>
<style>
body { background:black; color:#00ffcc; font-family:monospace; padding:20px; }

#log {
  height:300px;
  overflow-y:auto;
  border:1px solid #00ffcc;
  padding:10px;
  margin-bottom:10px;
}

input {
  width:100%;
  background:black;
  color:#00ffcc;
  border:1px solid #00ffcc;
  padding:10px;
}
</style>
</head>

<body>

<h2>> AI TERMINAL</h2>

<div id="log"></div>
<input id="cmd" placeholder="Enter command...">

<script>
const log = document.getElementById("log");

function print(text) {
  log.innerHTML += "<div>> " + text + "</div>";
  log.scrollTop = log.scrollHeight;
}

// LOAD PROGRESS
let progress = JSON.parse(localStorage.getItem("progress") || "{}");

// FILE SYSTEM (PUZZLE SPLIT)
const files = {
  "clue1.txt": "key part: zt",
  "clue2.txt": "key part: ke",
  "clue3.txt": "key part: tl",
  "log.txt": "they told us not to combine them...",
  "decoy.txt": "password = admin123"
};

// LOCKED FILE
const lockedFiles = {
  "final_clue.txt": { content: "final piece unlocked", key: "ztketl" }
};

// COMMAND HANDLER
function handleCommand(input) {
  const args = input.split(" ");
  const cmd = args[0];

  switch(cmd) {

    case "help":
      print("help, ls, cat, unlock, override, login");
      break;

    case "ls":
      print(Object.keys(files).concat(Object.keys(lockedFiles)).join(" "));
      break;

    case "cat":
      if(files[args[1]]) {
        print(files[args[1]]);
        progress["read_" + args[1]] = true;
      }
      else if(lockedFiles[args[1]]) {
        print("LOCKED");
      }
      else {
        print("Not found");
      }
      break;

    case "unlock":
      // TRAP PATH
      if(args[1]==="final_clue.txt" && args[2]==="admin123"){
        print("Access granted...");
        setTimeout(()=>{
          print("...wait...");
          print("...you shouldn't have done that...");
        },1000);
      }
      // REAL SOLUTION
      else if(args[1]==="final_clue.txt" && args[2]==="ztketl"){
        print("Unlocked.");
        progress["unlocked_final"] = true;
        localStorage.setItem("hasKey", true);
      }
      else {
        print("Wrong key");
      }
      break;

    case "override":
      if(localStorage.getItem("hasKey")){
        progress["override_used"] = true;
        window.location="hidden.html";
      } else {
        print("DENIED");
      }
      break;

    case "login":
      window.location="login.html";
      break;

    // 🔒 HIDDEN COMMANDS (NOT IN HELP)

    case "whoami":
      print("user: unknown");
      print("permission: restricted");
      break;

    case "breach":
      print("ACCESSING...");
      setTimeout(() => {
        print("ERROR: ENTITY DETECTED");
      }, 1000);
      break;

    case "listen":
      print("...it hears you...");
      break;

    default:
      print("Unknown");
  }

  localStorage.setItem("progress", JSON.stringify(progress));
}

// INPUT LISTENER
document.getElementById("cmd").addEventListener("keydown", function(e){
  if(e.key==="Enter"){
    const input=this.value.toLowerCase();
    print("> " + input);
    handleCommand(input);
    this.value="";
  }
});

// 👁️ RANDOM GLITCH EVENTS
setInterval(() => {
  if(Math.random() < 0.2){
    print("...signal lost...");
    
    setTimeout(() => {
      print("...reconnecting...");
    }, 1000);

    setTimeout(() => {
      print("...something else is here...");
    }, 2000);
  }
}, 15000);

// 👁️ SLOW AI AWARENESS
setTimeout(() => {
  print("You keep coming back.");
}, 30000);

setTimeout(() => {
  print("Why?");
}, 45000);

</script>

</body>
</html>
