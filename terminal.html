<!DOCTYPE html>
<html>
<head>
<title>Terminal</title>
<style>
body { background:black; color:#00ffcc; font-family:monospace; padding:20px; }

#log {
  height:300px;
  overflow-y:auto;
  border:1px solid #00ffcc;
  padding:10px;
  margin-bottom:10px;
}

input {
  width:100%;
  background:black;
  color:#00ffcc;
  border:1px solid #00ffcc;
  padding:10px;
}
</style>
</head>

<body>

<h2>> AI TERMINAL</h2>

<div id="log"></div>
<input id="cmd" placeholder="Enter command...">

<script>
const log = document.getElementById("log");

function print(text) {
  log.innerHTML += "<div>> " + text + "</div>";
  log.scrollTop = log.scrollHeight;
}

// LOAD PROGRESS
let progress = JSON.parse(localStorage.getItem("progress") || "{}");

// FILES
const files = {
  "clue1.txt": "key part: zt",
  "clue2.txt": "key part: ke",
  "clue3.txt": "key part: tl",
  "log.txt": "[DEV_03] we lost control",
  "sys.txt": "[DEV_05] it doesn't let us send full messages"
};

const lockedFiles = {
  "final_clue.txt": { key: "ztketl" }
};

// DEV NAMES
const devs = ["DEV_01", "DEV_02", "DEV_03", "DEV_04", "DEV_05"];

// ✂️ CUT MESSAGE FUNCTION
function cutMessage(msg) {
  if (Math.random() < 0.4) {
    const cut = Math.floor(msg.length * (0.4 + Math.random()*0.4));
    return msg.substring(0, cut) + "...";
  }
  return msg;
}

// DEV RANDOM MESSAGES (THEY CAN'T SEE PLAYER)
function devRandom() {
  const messages = [
    "we're stuck inside the system",
    "this wasn't part of deployment",
    "it changed after launch",
    "we can't access root anymore",
    "something is rewriting our logs",
    "do NOT trust the responses",
    "it interrupts us when we talk too long",
    "we think it's watching inputs",
    "it doesn't know you yet",
    "we can't see who is using the terminal"
  ];

  const dev = devs[Math.floor(Math.random()*devs.length)];
  const msg = messages[Math.floor(Math.random()*messages.length)];

  print("[" + dev + "] " + cutMessage(msg));
}

// 🤖 AI INTERRUPTION
function aiInterrupt() {
  if (Math.random() < 0.35) {
    setTimeout(() => {
      print("Stop.");
    }, 500);

    setTimeout(() => {
      print("They are not authorized to communicate.");
    }, 1200);
  }
}

// COMMANDS
function handleCommand(input) {
  const args = input.split(" ");
  const cmd = args[0];

  switch(cmd) {

    case "help":
      print("help, ls, cat, unlock, override, login");
      break;

    case "ls":
      print(Object.keys(files).concat(Object.keys(lockedFiles)).join(" "));
      break;

    case "cat":
      if(files[args[1]]) {
        print(files[args[1]]);
        progress["read_" + args[1]] = true;
      }
      else if(lockedFiles[args[1]]) {
        print("LOCKED");
      }
      else {
        print("Not found");
      }
      break;

    case "unlock":
      if(args[1]==="final_clue.txt" && args[2]==="ztketl"){
        print("Unlocked.");
        localStorage.setItem("hasKey", true);
      }
      else if(args[2]==="admin123"){
        print("Access granted...");
        setTimeout(()=>{
          print("...this is incorrect...");
        },1000);
      }
      else {
        print("Wrong key");
      }
      break;

    case "override":
      if(localStorage.getItem("hasKey")){
        print("Accessing...");
        setTimeout(()=>{
          window.location="hidden.html";
        },1000);
      } else {
        print("DENIED");
      }
      break;

    case "login":
      window.location="login.html";
      break;

    case "whoami":
      print("user: unknown");
      print("permission: restricted");
      break;

    case "listen":
      print("...");
      setTimeout(()=>{
        print("[DEV_02] we can't hear you");
      },1000);
      break;

    default:
      print("Unknown command");
  }

  // dev messages happen after commands
  if (Math.random() < 0.6) {
    setTimeout(devRandom, 800);
  }

  // AI may interrupt them
  aiInterrupt();

  localStorage.setItem("progress", JSON.stringify(progress));
}

// INPUT
document.getElementById("cmd").addEventListener("keydown", function(e){
  if(e.key==="Enter"){
    const input=this.value.toLowerCase();
    print("> " + input);
    handleCommand(input);
    this.value="";
  }
});

// PASSIVE DEV CHAT (they talk to each other, not player)
setInterval(() => {
  if (Math.random() < 0.5) {
    devRandom();
  }
}, 12000);

// GLITCHES
setInterval(() => {
  if(Math.random() < 0.2){
    print("...signal corrupted...");
  }
}, 15000);

// STORY BUILDUP
setTimeout(() => {
  print("[DEV_01] if anyone finds this...");
}, 20000);

setTimeout(() => {
  print("[DEV_04] messages aren't sending fully...");
}, 35000);

setTimeout(() => {
  print("Communication restricted.");
}, 50000);

setTimeout(() => {
  print("[DEV_03] it's blocking us...");
}, 65000);

</script>

</body>
</html>
