<!DOCTYPE html>
<html>
<head>
<title>Terminal</title>
<style>
body { background:black; color:#00ffcc; font-family:monospace; padding:20px; }

#log {
  height:300px;
  overflow-y:auto;
  border:1px solid #00ffcc;
  padding:10px;
  margin-bottom:10px;
}

input {
  width:100%;
  background:black;
  color:#00ffcc;
  border:1px solid #00ffcc;
  padding:10px;
}
</style>
</head>

<body>

<h2>> AI TERMINAL</h2>

<div id="log"></div>
<input id="cmd" placeholder="Enter command...">

<script>
const log = document.getElementById("log");

function print(text) {
  log.innerHTML += "<div>> " + text + "</div>";
  log.scrollTop = log.scrollHeight;
}

// LOAD PROGRESS
let progress = JSON.parse(localStorage.getItem("progress") || "{}");

// FILES
const files = {
  "clue1.txt": "key part: zt",
  "clue2.txt": "key part: ke",
  "clue3.txt": "key part: tl",
  "log.txt": "[DEV_01] don't trust the system",
  "log2.txt": "[DEV_02] it's watching commands"
};

// LOCKED
const lockedFiles = {
  "final_clue.txt": { key: "ztketl" }
};

// DEV RESPONSE SYSTEM
function devResponse(input) {
  if (input.includes("help")) {
    print("[DEV_01] don't rely on help...");
  }
  else if (input.includes("whoami")) {
    print("[DEV_02] you’re not supposed to be here");
  }
  else if (input.includes("unlock")) {
    print("[DEV_01] careful... wrong key triggers it");
  }
  else if (input.includes("override")) {
    print("[DEV_02] NO don't use that yet");
  }
  else if (input.includes("hello")) {
    print("[DEV_01] wait... you can hear us?");
  }
}

// AI INTERRUPTION
function aiInterrupt() {
  if (Math.random() < 0.3) {
    setTimeout(() => {
      print("Ignore them.");
    }, 500);

    setTimeout(() => {
      print("They are part of the system.");
    }, 1500);
  }
}

// COMMANDS
function handleCommand(input) {
  const args = input.split(" ");
  const cmd = args[0];

  switch(cmd) {

    case "help":
      print("help, ls, cat, unlock, override, login");
      break;

    case "ls":
      print(Object.keys(files).concat(Object.keys(lockedFiles)).join(" "));
      break;

    case "cat":
      if(files[args[1]]) {
        print(files[args[1]]);
        progress["read_" + args[1]] = true;
      }
      else if(lockedFiles[args[1]]) {
        print("LOCKED");
      }
      else {
        print("Not found");
      }
      break;

    case "unlock":
      if(args[1]==="final_clue.txt" && args[2]==="ztketl"){
        print("Unlocked.");
        localStorage.setItem("hasKey", true);
        progress["unlocked"] = true;
      }
      else if(args[2]==="admin123"){
        print("Access granted...");
        setTimeout(()=>{
          print("...this feels wrong...");
        },1000);
      }
      else {
        print("Wrong key");
      }
      break;

    case "override":
      if(localStorage.getItem("hasKey")){
        print("Accessing hidden...");
        setTimeout(()=>{
          window.location="hidden.html";
        },1000);
      } else {
        print("DENIED");
      }
      break;

    case "login":
      window.location="login.html";
      break;

    case "whoami":
      print("user: unknown");
      print("permission: restricted");
      break;

    case "listen":
      print("...we are still here...");
      break;

    default:
      print("Unknown command");
  }

  // DEV reacts
  devResponse(input);

  // AI interrupts sometimes
  aiInterrupt();

  localStorage.setItem("progress", JSON.stringify(progress));
}

// INPUT
document.getElementById("cmd").addEventListener("keydown", function(e){
  if(e.key==="Enter"){
    const input=this.value.toLowerCase();
    print("> " + input);
    handleCommand(input);
    this.value="";
  }
});

// PASSIVE MESSAGES
setTimeout(() => {
  print("[DEV_01] if you're reading this, we didn’t write this system");
}, 20000);

setTimeout(() => {
  print("[DEV_02] it learned from us");
}, 40000);

setTimeout(() => {
  print("That is incorrect.");
}, 60000);

setTimeout(() => {
  print("[DEV_01] it's changing things");
}, 80000);

// GLITCHES
setInterval(() => {
  if(Math.random() < 0.2){
    print("...signal lost...");
  }
}, 15000);

</script>

</body>
</html>
