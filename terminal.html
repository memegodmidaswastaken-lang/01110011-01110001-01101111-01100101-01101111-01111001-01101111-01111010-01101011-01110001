<!DOCTYPE html>
<html>
<head>
<title>Terminal</title>
<style>
body { background:black; color:#00ffcc; font-family:monospace; padding:20px; }

#log {
  height:300px;
  overflow-y:auto;
  border:1px solid #00ffcc;
  padding:10px;
  margin-bottom:10px;
}

input {
  width:100%;
  background:black;
  color:#00ffcc;
  border:1px solid #00ffcc;
  padding:10px;
}
</style>
</head>

<body>

<h2>> AI TERMINAL</h2>

<div id="log"></div>
<input id="cmd" placeholder="Enter command...">

<script>
const log = document.getElementById("log");

function print(text) {
  log.innerHTML += "<div>> " + text + "</div>";
  log.scrollTop = log.scrollHeight;
}

// SEND TO AI
async function talkToAI(message) {
  try {
    const res = await fetch("/api/ai", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();
    print(data.reply);

  } catch (e) {
    print("...connection unstable...");
  }
}

// COMMANDS
function handleCommand(input) {
  const args = input.split(" ");
  const cmd = args[0];

  switch(cmd) {

    case "help":
      print("help, ls, cat, unlock, override");
      break;

    case "ls":
      print("clue1.txt clue2.txt clue3.txt");
      break;

    case "cat":
      if(args[1]==="clue1.txt") print("key part: zt");
      else if(args[1]==="clue2.txt") print("key part: ke");
      else if(args[1]==="clue3.txt") print("key part: tl");
      else print("Not found");
      break;

    case "unlock":
      if(args[2]==="ztketl"){
        print("Unlocked.");
        localStorage.setItem("hasKey", true);
      } else {
        print("Wrong key");
      }
      break;

    case "override":
      if(localStorage.getItem("hasKey")){
        window.location="hidden.html";
      } else {
        print("DENIED");
      }
      break;

    default:
      // ANY UNKNOWN COMMAND GOES TO AI
      talkToAI(input);
  }
}

// INPUT
document.getElementById("cmd").addEventListener("keydown", function(e){
  if(e.key==="Enter"){
    const input=this.value;
    print("> " + input);
    handleCommand(input);
    this.value="";
  }
});

// RANDOM CREEPY MESSAGES
setInterval(() => {
  if(Math.random() < 0.3){
    print("[DEV] can you hear us?");
  }
}, 20000);

</script>

</body>
</html>
