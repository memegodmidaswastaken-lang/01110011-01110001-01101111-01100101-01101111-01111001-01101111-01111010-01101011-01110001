<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body { background:black; color:#00ffcc; font-family:monospace; text-align:center; padding-top:100px; }
input { margin:10px; padding:10px; background:black; color:#00ffcc; border:1px solid #00ffcc; }
</style>
</head>

<body>

<h2>> AUTH REQUIRED</h2>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">ENTER</button>

<p id="msg"></p>

<script>
function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(u==="admin" && p==="secret"){
    localStorage.setItem("role","admin");
    window.location="admin.html";
  }
  else if(u==="dev" && p==="dev123"){
    localStorage.setItem("role","dev");
    window.location="dev.html";
  }
  else if(u==="mod" && p==="mod123"){
    localStorage.setItem("role","mod");
    window.location="mod.html";
  }
  else {
    document.getElementById("msg").innerText="DENIED";
  }
}
</script>

<!-- nothing here... or is there? -->

</body>
</html>
