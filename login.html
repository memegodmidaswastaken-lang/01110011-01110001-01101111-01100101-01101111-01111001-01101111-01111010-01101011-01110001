<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body { background:black; color:#00ffcc; font-family:monospace; text-align:center; padding-top:100px; }
input { margin:10px; padding:10px; background:black; color:#00ffcc; border:1px solid #00ffcc; }
</style>
</head>

<body>

<h2>> AUTH REQUIRED</h2>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">ENTER</button>

<p id="msg"></p>

<script>
function login(){
  if(
    document.getElementById("user").value==="dev_access" &&
    document.getElementById("pass").value==="secret"
  ){
    document.getElementById("msg").innerText="ACCESS GRANTED";
    setTimeout(()=>window.location="admin.html",1000);
  } else {
    document.getElementById("msg").innerText="DENIED";
  }
}
</script>

<!-- key hint: combine parts -->

</body>
</html>
