<!DOCTYPE html>
<html>
<head>
<title>Owner Panel</title>
<style>
body { background:black; color:#00ffcc; font-family:monospace; padding:40px; }
</style>
</head>

<body>

<h2>> OWNER ACCESS</h2>

<div id="data"></div>

<script>
// 🔒 SECRET CHECK
const urlParams = new URLSearchParams(window.location.search);
const key = urlParams.get("key");

// ONLY ALLOW IF SECRET KEY IS PRESENT
if(key !== "root_access_77"){
  document.body.innerHTML = "<h1 style='color:red;text-align:center;margin-top:100px;'>ACCESS DENIED</h1>";
} else {

  const data = document.getElementById("data");
  const progress = JSON.parse(localStorage.getItem("progress") || "{}");

  data.innerHTML = "<h3>Player Progress:</h3>";

  for(let k in progress){
    data.innerHTML += "<p>> " + k + " : " + progress[k] + "</p>";
  }
}
</script>

</body>
</html>
